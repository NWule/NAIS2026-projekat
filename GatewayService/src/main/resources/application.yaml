server:
  port: 9000

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
      
spring:
  application:
    name: gateway-api
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: player-recommendation-service
          uri: lb://PLAYERRECOMMENDATIONSERVICE
          predicates:
            - Path=/playerrecommendationservice/**
          filters:
            - StripPrefix=1
        - id: graph-database-service
          uri: lb://graph-database-service
          predicates:
            - Path=/graph-database-service/**
          filters:
            - StripPrefix=1
        - id: ticket-sales-service
          uri: lb://ticket-sales-service
          predicates:
            - Path=/ticket-sales-service/**
          filters:
            - StripPrefix=1
        - id: vector-database-service
          uri: lb://vector-database-service
          predicates:
            - Path=/vector-database-service/**
          filters:
            - StripPrefix=1
        

