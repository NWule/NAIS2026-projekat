# Osnovne informacije
spring.application.name=demo
server.port=9000

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.cache.redis.time-to-live=600000

spring.influx.token=${INFLUXDB_TOKEN:tvoj-token-ovde}
spring.influx.bucket=nais_bucket
spring.influx.org=nais_org
spring.influx.url=${INFLUXDB_URL:http://localhost:8086}

spring.cloud.discovery.client.simple.enabled=false

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}